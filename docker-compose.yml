services:
  marra-db:
    image: postgres:16-alpine
    container_name: marra-transportes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marra_transportes}
      POSTGRES_USER: ${POSTGRES_USER:-marra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marra_change_me}
    volumes:
      - marra-transportes-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  marra-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marra-transportes-app
    restart: unless-stopped
    depends_on:
      marra-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5173
      DATABASE_URL: postgres://${POSTGRES_USER:-marra_user}:${POSTGRES_PASSWORD:-marra_change_me}@marra-db:5432/${POSTGRES_DB:-marra_transportes}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_before_production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@marra.local}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@marra.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_this_password_before_production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MARRA_NOTIFICATION_EMAILS: ${MARRA_NOTIFICATION_EMAILS:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://app.marratransportes.com.br}
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - marra-transportes-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  marra-transportes-db:
  marra-transportes-uploads:
